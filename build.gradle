buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:8.7.3"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "https://jitpack.io" }
        exclusiveContent {
            forRepository {
                maven {
                    url "https://raw.githubusercontent.com/PickleHik3/termux-launcher/403d2bec7fd8cb2436fe9f22180d00a8ca629ff2/maven/"
                }
            }
            filter {
                includeGroup "com.termux"
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
